{% extends 'base.html' %}


{% block content %}
    {% load crispy_forms_tags %}

    <div class="row">
        {% include 'dashboard/sidebar.html' %}

        <!-- right side content -->

        <div class="col-md-9">
            
            {% if perms.auth.add_user %}
                
            
            
            <h2>Add New User</h2>

            <form action="{% url 'add_user' %}" method="POST">
                {% csrf_token %}
                {{ form | crispy }}
                <button type="submit" class="btn btn-warning">Submit</button>
            </form>
            <br>
            {% else %}
            <h4>You dont have permissions to view this page.</h4>
            {% endif %}
        </div>
    </div>
{% endblock %}
